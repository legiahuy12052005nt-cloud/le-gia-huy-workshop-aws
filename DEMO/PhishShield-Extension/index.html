<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Xác Thực An Toàn Hub - PhishShield Simulation</title>
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); width: 100%; max-width: 400px; border-top: 5px solid #00a859; position: relative; }
        .simulation-badge { position: absolute; top: 12px; right: 12px; background: #e63946; color: #fff; font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area h2 { color: #333; margin: 5px 0 0 0; font-size: 22px; }
        .logo-area p { color: #777; font-size: 13px; margin: 5px 0 0 0; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; color: #555; font-weight: 600; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #cccccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; transition: border 0.2s; }
        .form-group input:focus { border-color: #00a859; outline: none; }
        .btn-submit { width: 100%; padding: 12px; background-color: #00a859; color: #ffffff; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background-color: #008744; }
        .footer-note { text-align: center; margin-top: 25px; font-size: 11px; color: #999; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <h2>XÁC THỰC ĐĂNG KÍ</h2>
            <p>Nhiều ưu đãi khi đăng kí ngay bây giờ </p>
        </div>
        
        <form onsubmit="event.preventDefault(); alert('Simulation Target Only');">
            <div class="form-group">
                <label>TÊN ĐĂNG NHẬP / SỐ ĐIỆN THOẠI</label>
                <input type="text" placeholder="Nhập tên tài khoản..." required autocomplete="off">
            </div>
            <div class="form-group">
                <label>MẬT KHẨU TRUY CẬP</label>
                <input type="password" placeholder="Nhập mật khẩu..." required>
            </div>
            <button type="submit" class="btn-submit">TIẾP TỤC XÁC MINH</button>
        </form>

        <div class="footer-note">
            © 2026 VIETCOMBANK. All rights reserved.
        </div>
    </div>

</body>
</html>
